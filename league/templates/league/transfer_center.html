{% extends 'league/base.html' %}

{% block title %}Transfer Center{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 ml-auto mr-auto">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Official Transfer Center</h2>
                <p class="category">Logged in as Admin: <strong class="text-info">{{ user.username }}</strong></p>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}

                    <div class="form-group">
                        <label class="text-primary" style="font-size: 1.2rem;">1. Select Player to Transfer</label>
                        <select name="player_id" class="form-control" style="background-color: #27293d; color: white;" required>
                            <option value="">-- Choose Player --</option>
                            {% for p in all_players %}
                                <option value="{{ p.id }}">
                                    {{ p.player_name }} (Current: {{ p.club.club_name }})
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group mt-4">
                        <label class="text-primary" style="font-size: 1.2rem;">2. Select Destination Club</label>
                        <select name="new_club_id" class="form-control" style="background-color: #27293d; color: white;" required>
                            <option value="">-- Choose New Club --</option>
                            {% for c in all_clubs %}
                                <option value="{{ c.id }}">{{ c.club_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-fill btn-primary">Execute Transfer</button>
                    </div>
                </form>

                <hr class="mt-5">

<div class="row mt-4">
    <div class="col-md-6 ml-auto mr-auto text-center">
        <a href="{% url 'player_list' %}" class="btn btn-info btn-sm d-block mx-auto" style="width: 200px;">
            View Player List
        </a>
        <a href="{% url 'home' %}" class="btn btn-default btn-sm d-block mx-auto mt-2" style="width: 200px;">
            Back to Home
        </a>
    </div>
</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
